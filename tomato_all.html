<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=320, initial-scale=1.0">
    <title>наші соняшники - agridera</title>
    <link href="https://fonts.googleapis.com/css2?family=roboto+slab:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/adaptive.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <script src="js/main.js" defer></script>
    
    <style>
        /* пастельный фон под соняшник */
        #app { background-color: #fffde6; min-height: 100vh; }
        .product-card img { height: 200px; object-fit: cover; width: 100%; border-radius: 5px; }
        /* небольшая правка для отображения меню, если стили завязаны на класс is-open */
        .top-menu.is-open { display: flex !important; }
    </style>
</head>
<body>

    <div id="app">
        <header class="main-head inner-page-head">
            <div class="wrapper head-flex">
                <div class="brand-logo">
                    <a href="index.html">
                        <img src="img/Logo.png" alt="agridera logo" height="50">
                    </a>
                </div>
                <div class="header-right head-controls">
                    <div class="search-field">
                        <input type="text" placeholder="search">
                        <span class="find-icon"><i class="bi bi-search"></i></span>
                    </div>

                    <div class="burger-trigger" id="burger-btn">
                        <i class="bi bi-list"></i>
                    </div>

                    <nav class="top-menu" id="mobile-nav">
                        <div class="close-menu" id="close-btn">
                            <i class="bi bi-x-lg"></i>
                        </div>
                        <a href="index.html">home</a>
                        <a href="tomato_all.html">company profile</a>
                        <a href="tomato_all.html">products</a>
                        <a href="#">services</a>
                        <a href="#">r & d</a>
                        <a href="contact.html">contact</a>
                    </nav>
                </div>
            </div>
        </header>

        <main class="tomato-page-main">
            <section class="page-banner">
                <img src="img/page2/fon.png" alt="sunflower banner">
            </section>

            <section class="page-content">
                <div class="wrapper">
                    <h1 class="page-title">наші свіжі соняшники</h1>
                    <div class="stars-sep left-align">*****</div>

                    <div class="text-content">
                        <p>ми пропонуємо найкраще насіння соняшників, адаптованих до різних кліматичних зон.</p>
                    </div>

                    <div class="product-grid">
                        <div class="product-card" v-for="p in products" :key="p.id">
                            <a :href="'tomat_one.html#' + p.id" style="text-decoration: none; color: inherit;">
                                <img :src="p.image" :alt="p.title">
                                <div class="product-info">
                                    <h5>{{ p.title }}</h5>
                                    <p>{{ p.short_text }}</p>
                                </div>
                            </a>
                        </div>
                    </div>
                </div>
            </section>
        </main>

        <footer class="base-footer">
            <div class="wrapper footer-wrap">
                <nav class="footer-links">
                    <a href="#">profile</a>
                    <a href="#">management</a>
                    <a href="#">products</a>
                    <a href="#">r&d</a>
                    <a href="#">links</a>
                    <a href="#">sitemap</a>
                    <a href="contact.html">contact</a>
                </nav>
                <div class="social-icons">
                    <a href="#" class="icon-circle"><i class="bi bi-linkedin"></i></a>
                    <a href="#" class="icon-circle"><i class="bi bi-instagram"></i></a>
                    <a href="#" class="icon-circle"><i class="bi bi-youtube"></i></a>
                    <a href="#" class="icon-circle"><i class="bi bi-twitter"></i></a>
                    <a href="#" class="icon-circle"><i class="bi bi-facebook"></i></a>
                </div>
            </div>
            <div class="copyright-line">agridera seeds & agriculture ltd. © 2026</div>
        </footer>
    </div> <script>
        document.addEventListener('DOMContentLoaded', function() {
            const burgerBtn = document.getElementById('burger-btn');
            const closeBtn = document.getElementById('close-btn');
            const mobileNav = document.getElementById('mobile-nav');

            if (burgerBtn && mobileNav) {
                burgerBtn.addEventListener('click', function() {
                    mobileNav.classList.add('is-open');
                });
            }

            if (closeBtn && mobileNav) {
                closeBtn.addEventListener('click', function() {
                    mobileNav.classList.remove('is-open');
                });
            }
        });
    </script>

</body>
</html>
