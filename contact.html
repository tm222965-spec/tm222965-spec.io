<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>contact us - agridera</title>
    <link href="https://fonts.googleapis.com/css2?family=roboto+slab:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>

    <header class="main-head">
        <div class="wrapper head-flex">
            <div class="brand-logo">
                <img src="img/logo.png" alt="agridera logo" height="50">
            </div>
            <div class="head-controls">
                <div class="search-field">
                    <input type="text" placeholder="search">
                    <span class="find-icon"><i class="bi bi-search"></i></span>
                </div>
                <nav class="top-menu">
                    <a href="index.html">Home</a>
                    <a href="tomato_all.html">Company Profile</a>
                    <a href="tomat_one.html">Products</a>
                    <a href="#">Services</a>
                    <a href="#">R & D</a>
                    <a href="contact.html">Contact</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="contact-page-main">
        <div class="contact-hero">
            <img src="img/fon2.jpg" alt="fields landscape">
        </div>
        
        <div class="wrapper contact-content">
            <h1 class="page-title">contact us</h1>
            <div class="stars-sep left-align">*****</div>

            <form action="#" class="contact-form">
                <div class="form-columns">
                    <div class="form-col">
                        <div class="input-group">
                            <label>name *</label>
                            <input type="text" required>
                        </div>
                        <div class="input-group">
                            <label>company name</label>
                            <input type="text">
                        </div>
                        <div class="input-group">
                            <label>position</label>
                            <input type="text">
                        </div>
                        <div class="input-group">
                            <label>city</label>
                            <input type="text">
                        </div>
                        <div class="input-group">
                            <label>country</label>
                            <input type="text">
                        </div>
                        <div class="input-group">
                            <label>telephone</label>
                            <input type="tel">
                        </div>
                        <div class="input-group">
                            <label>email *</label>
                            <input type="email" required>
                        </div>
                    </div>
                    
                    <div class="form-col">
                        <div class="input-group">
                            <label>you are a</label>
                            <select>
                                <option>seed producer</option>
                                <option>distributor</option>
                                <option>farmer</option>
                                <option>other</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label>if other, please specify</label>
                            <input type="text">
                        </div>
                        <div class="input-group textarea-group">
                            <label>you are interested in</label>
                            <textarea></textarea>
                        </div>
                        
                        <div class="captcha-group">
                            <label>please type this code</label>
                            <div class="captcha-controls">
                                <span class="captcha-code">7 &nbsp;c &nbsp;j &nbsp;3</span>
                                <input type="text" class="captcha-input">
                                <button type="submit" class="submit-btn">send message</button>
                            </div>
                        </div>
                    </div>
                </div>
            </form>
        </div>

        <div class="address-block wrapper">
            <h3 class="address-title">our address</h3>
            <div class="address-text">
                agridera seeds & agriculture ltd.<br>
                p.o box 103,<br>
                gedera 70750, israel.<br>
                telephone: <a href="tel:+97289449222">+972 8 944 9222</a>
            </div>
        </div>
    </main>

    <footer class="base-footer">
        <div class="wrapper footer-wrap">
            <nav class="footer-links">
                <a href="#">profile</a>
                <a href="#">management</a>
                <a href="#">products</a>
                <a href="#">r&d</a>
                <a href="#">links</a>
                <a href="#">sitemap</a>
                <a href="#">contact</a>
            </nav>
            <div class="social-icons">
                <a href="#" class="icon-circle"><i class="bi bi-linkedin"></i></a>
                <a href="#" class="icon-circle"><i class="bi bi-instagram"></i></a>
                <a href="#" class="icon-circle"><i class="bi bi-youtube"></i></a>
                <a href="#" class="icon-circle"><i class="bi bi-twitter"></i></a>
                <a href="#" class="icon-circle"><i class="bi bi-facebook"></i></a>
            </div>
        </div>
        <div class="copyright-line">agridera seeds & agriculture ltd. © 2020</div>
    </footer>

</body>
</html>
